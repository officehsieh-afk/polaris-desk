# ===========================================================
# 本地開發用：一鍵起 Postgres + pgvector（W1–W2 的向量庫）
# 用法：make db-up  （或 docker compose up -d db）
# ===========================================================
services:
  db:
    image: pgvector/pgvector:pg16     # 已內建 pgvector extension
    container_name: polaris-db
    environment:
      POSTGRES_USER: polaris
      POSTGRES_PASSWORD: polaris
      POSTGRES_DB: polaris
    ports:
      - "5432:5432"
    volumes:
      - polaris_pgdata:/var/lib/postgresql/data
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polaris"]
      interval: 5s
      timeout: 3s
      retries: 5

  # app 服務先註解；W2-W3 API 入口接好再打開
  # app:
  #   build: .
  #   env_file: .env
  #   depends_on:
  #     db: { condition: service_healthy }
  #   ports: ["8000:8000"]

volumes:
  polaris_pgdata:
